<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Failed - FastShip</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f8fafc;
            font-family: "Manrope", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 460px;
            padding: 40px;
            border-radius: 24px;
            background-color: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.03), 0 8px 10px -6px rgba(15, 23, 42, 0.03), 0 0 0 1px rgba(15, 23, 42, 0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-header {
            margin-bottom: 32px;
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            letter-spacing: -0.5px;
        }

        .logo-header span {
            color: #2563eb;
        }

        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background-color: #fef2f2;
            color: #ef4444;
            border-radius: 50%;
            margin-bottom: 24px;
            border: 1px solid #fee2e2;
        }

        svg {
            width: 40px;
            height: 40px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        p.description {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 320px;
        }

        .action-button {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: #ffffff;
            background-color: #1e1b4b;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(30, 27, 75, 0.1);
        }

        .action-button:hover {
            background-color: #16143c;
            transform: translateY(-1px);
        }

        .action-button:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 32px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-header">🚀 <span>Fast</span>Ship</div>

        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-x">
                <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path>
                <path d="m14.5 9.5-5 5"></path>
                <path d="m9.5 9.5 5 5"></path>
            </svg>
        </div>

        <h1>Link Expired or Invalid</h1>
        <p class="description">This password reset link is no longer valid. It may have expired after 24 hours or has already been used.</p>

        <a href="{{ forgot_url }}" class="action-button">Request New Link</a>

        <div class="footer-text">
            &copy; 2026 FastShip. All rights reserved.
        </div>
    </div>
</body>
</html>
